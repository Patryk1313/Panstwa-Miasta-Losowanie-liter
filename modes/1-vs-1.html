<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Państwa Miasta 1 vs 1 - Wspólne Losowanie Litery</title>
    <meta name="description" content="Tryb 1vs1 do gry Państwa Miasta. Wspólne losowanie litery dla dwóch graczy siedzących naprzeciwko siebie.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <main class="app">
        <section class="card duel-mode-card">
            <div class="duel-board">
                <section class="duel-side duel-side-top" aria-label="Gracz górny">
                    <button id="duelLetterTop" type="button" class="letter-box duel-letter-box">?</button>
                    <button type="button" class="button-secondary duel-stop-button" data-stop-trigger="true">STOP</button>
                    <aside class="history duel-history" aria-label="Historia gracza górnego">
                        <div class="history-header">
                            <span>Historia</span>
                            <strong id="duelRemainingCountLeft">22 litery</strong>
                        </div>
                        <div class="history-list duel-history-list" id="duelHistoryListLeft">
                            <span class="history-empty">Brak losowań</span>
                        </div>
                    </aside>
                </section>

                <div class="duel-divider">
                    <a class="button-secondary duel-reset-button duel-back-button" href="../index.html">Powrót</a>
                    <button id="duelResetButton" type="button" class="button-secondary duel-reset-button">Resetuj</button>
                </div>

                <section class="duel-side" aria-label="Gracz dolny">
                    <button id="duelLetterBottom" type="button" class="letter-box duel-letter-box">?</button>
                    <button type="button" class="button-secondary duel-stop-button" data-stop-trigger="true">STOP</button>
                    <aside class="history duel-history" aria-label="Historia gracza dolnego">
                        <div class="history-header">
                            <span>Historia</span>
                            <strong id="duelRemainingCountRight">22 litery</strong>
                        </div>
                        <div class="history-list duel-history-list" id="duelHistoryListRight">
                            <span class="history-empty">Brak losowań</span>
                        </div>
                    </aside>
                </section>
            </div>

            <div class="stop-countdown-pair" id="stopCountdownPair">
                <div class="stop-countdown-box stop-countdown-top" id="stopCountdownTop">10</div>
                <div class="stop-countdown-box stop-countdown-bottom" id="stopCountdownBottom">10</div>
            </div>
        </section>
    </main>

    <script src="1-vs-1.js"></script>
    <script src="../scripts/duel-stop-countdown.js"></script>
</body>
</html>
